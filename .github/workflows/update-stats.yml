# Gera cards github-readme-stats (com PAT = commits + linguagens incl. privados) e streak em SVG estáticos.

name: Update README stats

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=matheuscbs&show_icons=true&include_all_commits=true&count_private=true&theme=omni&hide_border=true
          path: dist/stats.svg
          token: ${{ secrets.STATS_PAT }}

      - name: Generate top languages card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=matheuscbs&layout=compact&langs_count=8&theme=omni&hide=MATLAB,Shell,CSS&hide_border=true
          path: dist/top-langs.svg
          token: ${{ secrets.STATS_PAT }}

      - name: Generate streak card
        run: |
          set -euo pipefail
          curl -fsSL "https://streak-stats.demolab.com/?user=matheuscbs&type=svg&theme=tokyonight&hide_border=true" -o dist/streak.svg

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs: update stats cards"
          file_pattern: dist/stats.svg dist/top-langs.svg dist/streak.svg
