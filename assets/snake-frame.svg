<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 52" width="900" height="52" role="img" aria-labelledby="snTitle snDesc">
  <title id="snTitle">Trilho de dados para a cobrinha</title>
  <desc id="snDesc">Canal pixel com fluxo animado sugerindo cabo de energia ou backbone antes do gr&#225;fico de contribui&#231;&#245;es.</desc>
  <rect width="900" height="52" fill="#0d1117"/>
  <rect x="0" y="0" width="900" height="2" fill="#44475a"/>
  <rect x="24" y="14" width="852" height="22" rx="2" fill="#161b22" stroke="#6272a4" stroke-width="1"/>
  <!-- Trilhos -->
  <line x1="40" y1="25" x2="860" y2="25" stroke="#bd93f9" stroke-width="2" stroke-dasharray="10 6" opacity="0.5">
    <animate attributeName="stroke-dashoffset" values="0;32" dur="1.2s" repeatCount="indefinite"/>
  </line>
  <line x1="40" y1="31" x2="860" y2="31" stroke="#8be9fd" stroke-width="2" stroke-dasharray="8 8" opacity="0.4">
    <animate attributeName="stroke-dashoffset" values="0;-32" dur="1.5s" repeatCount="indefinite"/>
  </line>
  <!-- Pacotes de dados -->
  <g fill="#50fa7b">
    <rect x="60" y="20" width="8" height="8"><animate attributeName="x" values="60;820;60" dur="6s" repeatCount="indefinite"/></rect>
    <rect x="200" y="20" width="8" height="8" fill="#ff79c6"><animate attributeName="x" values="200;840;200" dur="7.5s" repeatCount="indefinite" begin="1s"/></rect>
    <rect x="400" y="20" width="8" height="8" fill="#8be9fd"><animate attributeName="x" values="400;860;400" dur="5.5s" repeatCount="indefinite" begin="0.5s"/></rect>
  </g>
  <text x="450" y="12" text-anchor="middle" fill="#6272a4" font-family="ui-monospace,monospace" font-size="9">DATA_TRUNK :: feed ao contribution grid</text>
</svg>
