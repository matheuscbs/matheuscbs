<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 52" width="900" height="52" role="img" aria-labelledby="snTitle snDesc">
  <title id="snTitle">Data Tunnel</title>
  <desc id="snDesc">Tunel lateral em pixel art levando para o quadro da cobrinha de contribuicoes.</desc>
  <rect width="900" height="52" fill="#0d1117"/>
  <rect x="18" y="12" width="864" height="28" fill="#161b22" stroke="#6272a4" stroke-width="2"/>
  <text x="30" y="30" font-family="ui-monospace,monospace" font-size="9" fill="#6272a4">DATA_TUNNEL :: CONTRIBUTION_STREAM</text>
  <rect x="44" y="34" width="16" height="4" fill="#ff79c6"><animate attributeName="x" values="44;840;44" dur="5s" repeatCount="indefinite"/></rect>
  <rect x="120" y="18" width="12" height="4" fill="#8be9fd"><animate attributeName="x" values="120;860;120" dur="4.2s" repeatCount="indefinite"/></rect>
  <rect x="300" y="34" width="10" height="4" fill="#50fa7b"><animate attributeName="x" values="300;840;300" dur="6s" repeatCount="indefinite"/></rect>
</svg>
