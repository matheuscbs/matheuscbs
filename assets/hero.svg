<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300" role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Level 01 - Tech Room Boot</title>
  <desc id="heroDesc">Cena principal estilo jogo 2D pixel art com HUD, avatar, janela cyberpunk e terminal ativo.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#1a1f3a"/>
    </linearGradient>
    <style><![CDATA[
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      @media (prefers-reduced-motion: reduce){
        .anim{animation:none!important}
      }
    ]]></style>
  </defs>

  <rect width="900" height="300" fill="url(#bg)"/>

  <!-- HUD -->
  <rect x="14" y="10" width="872" height="26" fill="#161b22" stroke="#44475a" stroke-width="2"/>
  <text x="28" y="28" class="mono" font-size="10" fill="#8be9fd">LEVEL 01 :: TECH_ROOM_BOOT</text>
  <text x="750" y="28" class="mono" font-size="10" fill="#50fa7b">XP 80%</text>
  <rect x="250" y="18" width="180" height="8" fill="#282a36"/>
  <rect x="250" y="18" width="144" height="8" fill="#ff79c6"/>

  <!-- Window and city -->
  <rect x="520" y="56" width="350" height="150" fill="#0d1117" stroke="#6272a4" stroke-width="2"/>
  <g fill="#f1fa8c">
    <rect x="550" y="72" width="2" height="2"><animate class="anim" attributeName="opacity" values="0.2;1;0.2" dur="2.1s" repeatCount="indefinite"/></rect>
    <rect x="610" y="92" width="2" height="2"><animate class="anim" attributeName="opacity" values="0.3;1;0.3" dur="1.7s" repeatCount="indefinite"/></rect>
    <rect x="770" y="82" width="2" height="2"><animate class="anim" attributeName="opacity" values="0.2;1;0.2" dur="2.5s" repeatCount="indefinite"/></rect>
  </g>
  <g transform="translate(540,118)" fill="#282a36">
    <rect x="0" y="40" width="42" height="32"/><rect x="50" y="20" width="56" height="52"/><rect x="114" y="28" width="38" height="44"/>
    <rect x="160" y="10" width="66" height="62"/><rect x="234" y="24" width="44" height="48"/><rect x="286" y="16" width="52" height="56"/>
  </g>
  <g fill="#bd93f9" opacity="0.8" transform="translate(540,118)">
    <rect x="8" y="48" width="4" height="4"><animate class="anim" attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/></rect>
    <rect x="74" y="34" width="4" height="4"><animate class="anim" attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/></rect>
    <rect x="178" y="22" width="4" height="4"><animate class="anim" attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/></rect>
    <rect x="300" y="30" width="4" height="4"><animate class="anim" attributeName="opacity" values="0.4;1;0.4" dur="1.1s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Floor -->
  <rect x="0" y="220" width="900" height="80" fill="#282a36"/>
  <rect x="0" y="220" width="900" height="3" fill="#ff79c6" opacity="0.35"/>

  <!-- Avatar + desk -->
  <g transform="translate(70,132)">
    <rect x="0" y="70" width="320" height="16" fill="#1a1f3a"/>
    <rect x="26" y="46" width="28" height="24" fill="#282a36"/>
    <polygon points="24,46 40,30 56,46" fill="#1a1f3a"/>
    <rect x="34" y="38" width="4" height="2" fill="#8be9fd"><animate class="anim" attributeName="opacity" values="1;1;0;1" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="46" y="38" width="4" height="2" fill="#8be9fd"><animate class="anim" attributeName="opacity" values="1;1;0;1" dur="3s" repeatCount="indefinite"/></rect>
    <rect x="78" y="18" width="210" height="120" rx="4" fill="#282a36" stroke="#44475a" stroke-width="2"/>
    <rect x="90" y="30" width="186" height="88" fill="#0d1117"/>
    <text x="98" y="48" class="mono" font-size="8" fill="#50fa7b">&gt; matheuscbs@architect:~$</text>
    <text x="98" y="64" class="mono" font-size="8" fill="#f1fa8c">quest start --impact visual</text>
    <text x="98" y="80" class="mono" font-size="8" fill="#8be9fd">render pixel_story --mode cinematic</text>
    <text x="98" y="96" class="mono" font-size="8" fill="#bd93f9">latency reduced: 80%</text>
    <rect x="98" y="104" width="6" height="2" fill="#8be9fd"><animate class="anim" attributeName="opacity" values="1;0;1" dur="0.6s" repeatCount="indefinite"/></rect>
  </g>

  <!-- Speech bubble -->
  <g transform="translate(420,84)">
    <rect x="0" y="0" width="86" height="44" fill="#161b22" stroke="#8be9fd" stroke-width="2"/>
    <polygon points="22,44 30,44 26,52" fill="#161b22" stroke="#8be9fd" stroke-width="2"/>
    <text x="8" y="18" class="mono" font-size="7" fill="#8be9fd">MISSION:</text>
    <text x="8" y="30" class="mono" font-size="7" fill="#50fa7b">Build impact</text>
  </g>

  <text x="28" y="208" class="mono" font-size="10" fill="#6272a4">"A tecnologia que move a agulha"</text>
</svg>
