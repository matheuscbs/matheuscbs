<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 132" width="900" height="132" role="img" aria-labelledby="abTitle abDesc">
  <title id="abTitle">Esta&#231;&#227;o de arquitetura</title>
  <desc id="abDesc">Parede do quarto tech com tr&#234;s monitores mostrando temas de arquitetura, dados e nuvem, cabos e luzes.</desc>
  <defs>
    <style type="text/css"><![CDATA[ .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; } ]]></style>
    <linearGradient id="abBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="900" height="132" fill="url(#abBg)"/>
  <rect x="0" y="0" width="900" height="3" fill="#ff79c6" opacity="0.35"/>
  <rect x="0" y="96" width="900" height="36" fill="#282a36"/>
  <rect x="0" y="96" width="900" height="2" fill="#44475a"/>

  <!-- Monitores -->
  <g transform="translate(80,24)">
    <rect width="120" height="72" rx="3" fill="#282a36" stroke="#44475a" stroke-width="2"/>
    <rect x="8" y="8" width="104" height="48" fill="#0d1117"/>
    <text x="60" y="28" class="mono" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#50fa7b">ARCH</text>
    <text x="60" y="42" class="mono" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7" fill="#6272a4">diagram v2</text>
    <rect x="52" y="62" width="16" height="6" fill="#44475a"/>
    <rect x="44" y="68" width="32" height="4" fill="#1a1f3a"/>
  </g>
  <g transform="translate(390,28)">
    <rect width="112" height="68" rx="3" fill="#282a36" stroke="#bd93f9" stroke-width="1.5" opacity="0.9"/>
    <rect x="8" y="8" width="96" height="44" fill="#0d1117"/>
    <text x="56" y="30" class="mono" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#8be9fd">DATA</text>
    <text x="56" y="44" class="mono" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7" fill="#ff79c6">stream OK</text>
    <rect x="48" y="58" width="16" height="6" fill="#44475a"/>
  </g>
  <g transform="translate(680,20)">
    <rect width="128" height="76" rx="3" fill="#282a36" stroke="#44475a" stroke-width="2"/>
    <rect x="8" y="8" width="112" height="52" fill="#0d1117"/>
    <text x="64" y="32" class="mono" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#bd93f9">CLOUD</text>
    <text x="64" y="46" class="mono" text-anchor="middle" font-family="ui-monospace,monospace" font-size="7" fill="#50fa7b">scale-out</text>
    <rect x="56" y="66" width="16" height="6" fill="#44475a"/>
  </g>

  <!-- Cabos -->
  <path d="M200 96 L200 88 L420 88 L420 96" fill="none" stroke="#6272a4" stroke-width="2"/>
  <path d="M446 96 L446 84 L744 84 L744 96" fill="none" stroke="#6272a4" stroke-width="2"/>
  <g fill="#ff79c6" opacity="0.7">
    <rect x="208" y="86" width="4" height="4"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.4s" repeatCount="indefinite"/></rect>
    <rect x="360" y="82" width="4" height="4"><animate attributeName="opacity" values="0.4;1;0.4" dur="1.1s" repeatCount="indefinite" begin="0.3s"/></rect>
    <rect x="520" y="80" width="4" height="4"><animate attributeName="opacity" values="0.35;1;0.35" dur="1.6s" repeatCount="indefinite" begin="0.6s"/></rect>
  </g>

  <text x="450" y="118" text-anchor="middle" fill="#6272a4" font-family="ui-monospace,monospace" font-size="10">
    // mesa de arquitetura: contexto antes do &quot;Sobre mim&quot;
  </text>
</svg>
