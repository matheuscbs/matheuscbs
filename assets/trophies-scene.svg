<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 118" width="900" height="118" role="img" aria-labelledby="trTitle trDesc">
  <title id="trTitle">Vitrine de conquistas</title>
  <desc id="trDesc">Arcade pixel com letreiro luminoso e moldura roxa antes dos GitHub trophies.</desc>
  <defs>
    <linearGradient id="trBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1f3a"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="900" height="118" fill="url(#trBg)"/>
  <rect x="0" y="0" width="900" height="3" fill="#bd93f9" opacity="0.4"/>

  <!-- Gabinete arcade simplificado -->
  <rect x="120" y="16" width="660" height="86" rx="6" fill="#282a36" stroke="#bd93f9" stroke-width="3"/>
  <rect x="136" y="28" width="628" height="36" fill="#0d1117" stroke="#44475a" stroke-width="1"/>
  <!-- Marquee LEDs -->
  <g transform="translate(160,36)">
    <rect x="0" y="0" width="10" height="10" fill="#ff79c6"><animate attributeName="fill" values="#ff79c6;#f1fa8c;#ff79c6" dur="0.8s" repeatCount="indefinite"/></rect>
    <rect x="18" y="0" width="10" height="10" fill="#bd93f9"><animate attributeName="fill" values="#bd93f9;#8be9fd;#bd93f9" dur="0.8s" repeatCount="indefinite" begin="0.1s"/></rect>
    <rect x="36" y="0" width="10" height="10" fill="#8be9fd"><animate attributeName="fill" values="#8be9fd;#50fa7b;#8be9fd" dur="0.8s" repeatCount="indefinite" begin="0.2s"/></rect>
    <rect x="54" y="0" width="10" height="10" fill="#50fa7b"><animate attributeName="fill" values="#50fa7b;#ff79c6;#50fa7b" dur="0.8s" repeatCount="indefinite" begin="0.3s"/></rect>
    <rect x="72" y="0" width="10" height="10" fill="#f1fa8c"><animate attributeName="fill" values="#f1fa8c;#bd93f9;#f1fa8c" dur="0.8s" repeatCount="indefinite" begin="0.4s"/></rect>
    <rect x="90" y="0" width="10" height="10" fill="#ff79c6"><animate attributeName="fill" values="#ff79c6;#8be9fd;#ff79c6" dur="0.8s" repeatCount="indefinite" begin="0.5s"/></rect>
    <rect x="108" y="0" width="10" height="10" fill="#bd93f9"><animate attributeName="fill" values="#bd93f9;#f1fa8c;#bd93f9" dur="0.8s" repeatCount="indefinite" begin="0.6s"/></rect>
    <rect x="126" y="0" width="10" height="10" fill="#8be9fd"><animate attributeName="fill" values="#8be9fd;#ff79c6;#8be9fd" dur="0.8s" repeatCount="indefinite" begin="0.7s"/></rect>
  </g>
  <text x="450" y="58" text-anchor="middle" fill="#ff79c6" font-family="ui-monospace,monospace" font-size="11" font-weight="700" letter-spacing="4">ACHIEVEMENT_LOG</text>
  <text x="450" y="92" text-anchor="middle" fill="#6272a4" font-family="ui-monospace,monospace" font-size="10">
    // insira moeda imagin&#225;ria e veja os trof&#233;us reais abaixo
  </text>
</svg>
