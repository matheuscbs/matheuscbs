<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 124" width="820" height="124" role="img" aria-labelledby="statsTitle statsDesc">
  <title id="statsTitle">Boss HUD - GitHub Stats</title>
  <desc id="statsDesc">HUD estilo jogo para introduzir os cards de estat&#237;sticas como painel principal da fase.</desc>
  <rect width="820" height="124" fill="#0d1117"/>
  <rect x="4" y="4" width="812" height="116" fill="#161b22" stroke="#6272a4" stroke-width="2"/>
  <text x="22" y="24" font-family="ui-monospace,monospace" font-size="10" fill="#8be9fd">BOSS_FIGHT :: GITHUB_ACTIVITY</text>
  <text x="654" y="24" font-family="ui-monospace,monospace" font-size="10" fill="#50fa7b">HP 100%</text>
  <rect x="654" y="28" width="140" height="8" fill="#282a36"/>
  <rect x="654" y="28" width="112" height="8" fill="#ff79c6"/>
  <text x="22" y="56" font-family="ui-monospace,monospace" font-size="12" fill="#e6edf3">Commits, streak e linguagens em tempo de jogo.</text>
  <text x="22" y="74" font-family="ui-monospace,monospace" font-size="10" fill="#6272a4">Cada card abaixo representa uma barra de progresso da jornada.</text>
  <g fill="#bd93f9">
    <rect x="22" y="90" width="12" height="12"><animate attributeName="opacity" values="0.3;1;0.3" dur="1s" repeatCount="indefinite"/></rect>
    <rect x="42" y="90" width="12" height="12"><animate attributeName="opacity" values="0.3;1;0.3" dur="1s" begin="0.2s" repeatCount="indefinite"/></rect>
    <rect x="62" y="90" width="12" height="12"><animate attributeName="opacity" values="0.3;1;0.3" dur="1s" begin="0.4s" repeatCount="indefinite"/></rect>
  </g>
</svg>
